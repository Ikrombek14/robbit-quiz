name: Deploy → robbit-quiz server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        run: npm ci && npm run build

      - name: Backend build
        working-directory: backend
        run: npm ci && npm run build

      - name: Tarball tayyorlash
        run: |
          mkdir -p _deploy/public
          cp -r backend/dist          _deploy/dist
          cp -r frontend/dist/.       _deploy/public/
          cp -r backend/prisma        _deploy/prisma
          cp    backend/package.json  _deploy/
          cp    backend/package-lock.json _deploy/
          cp    backend/ecosystem.config.cjs _deploy/
          rm -f _deploy/prisma/dev.db
          tar -czf robbit-quiz.tgz -C _deploy .

      - name: sshpass o'rnatish (SSH key bo'lmasa)
        run: sudo apt-get install -y sshpass

      - name: Serverga yuborish va o'rnatish
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
        run: |
          APP=/root/apps/robbit-quiz

          # SSH ulanish usuli: avval key sinab ko'r, bo'lmasa parol ishlat
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30"

          if [ -n "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "${{ secrets.SERVER_SSH_KEY }}" > /tmp/deploy_key
            chmod 600 /tmp/deploy_key
            SCP_CMD="scp -i /tmp/deploy_key $SSH_OPTS"
            SSH_CMD="ssh -i /tmp/deploy_key $SSH_OPTS"
          else
            SCP_CMD="sshpass -e scp $SSH_OPTS"
            SSH_CMD="sshpass -e ssh $SSH_OPTS"
          fi

          # Tarball yuborish
          $SCP_CMD robbit-quiz.tgz ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/tmp/

          # Serverda o'rnatish
          $SSH_CMD ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} bash <<'ENDSSH'
            set -e
            APP=/root/apps/robbit-quiz
            mkdir -p $APP
            tar -xzf /tmp/robbit-quiz.tgz -C $APP
            rm -f /tmp/robbit-quiz.tgz
            cd $APP
            npm install --omit=dev
            npx prisma generate
            npx prisma migrate deploy
            pm2 restart robbit-quiz 2>/dev/null || pm2 start $APP/ecosystem.config.cjs
            pm2 save
            echo "✅ Deploy tugadi: $(date)"
            pm2 logs robbit-quiz --lines 10 --nostream
          ENDSSH
