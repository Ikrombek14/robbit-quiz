name: Deploy → robbit-quiz server

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        env:
          # Google bilan kirish tugmasi build paytida client_id'ni talab qiladi (Vite).
          # Bu bo'lmasa frontend "Google bilan kirish sozlanmagan" deb chiqaradi.
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: npm ci && npm run build

      - name: Backend build
        working-directory: backend
        run: npm ci && npm run build

      - name: Tarball tayyorlash
        run: |
          mkdir -p _deploy/public
          cp -r backend/dist              _deploy/dist
          cp -r frontend/dist/.           _deploy/public/
          cp -r backend/prisma            _deploy/prisma
          cp    backend/package.json      _deploy/
          cp    backend/package-lock.json _deploy/
          cp    backend/ecosystem.config.cjs _deploy/
          rm -f _deploy/prisma/dev.db
          tar -czf robbit-quiz.tgz -C _deploy .

      - name: .env fayl tayyorlash
        env:
          DB_PASS: ${{ secrets.DB_PASS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          # Unix socket orqali ulanamiz (host=/var/run/postgresql): bu psql boshqaradigan
          # aynan o'sha cluster, 'local ... trust' qoidasiga tushadi — TCP/IPv6/parol
          # noaniqliklarisiz. Parol ham (percent-encode qilingan) qoldiriladi — ehtiyot uchun.
          DB_PASS_ENC=$(jq -rn --arg x "$DB_PASS" '$x|@uri')
          printf 'NODE_ENV=production\nPORT=4000\nCLIENT_URL=https://robbitquiz.uz\nDATABASE_URL=postgresql://robbit:%s@localhost:5432/robbit_quiz?host=/var/run/postgresql\nJWT_SECRET=%s\nANTHROPIC_API_KEY=%s\nGOOGLE_CLIENT_ID=%s\nADMIN_EMAILS=teamlead.robbit@gmail.com,ilkhomjon2001@gmail.com\n' \
            "$DB_PASS_ENC" "$JWT_SECRET" "$ANTHROPIC_API_KEY" "$GOOGLE_CLIENT_ID" > /tmp/app.env

      - name: sshpass o'rnatish
        run: sudo apt-get install -y sshpass

      - name: Serverga yuborish va o'rnatish
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
          DB_PASS: ${{ secrets.DB_PASS }}
          ADMIN_EMAIL: teamlead.robbit@gmail.com
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          HOST=${{ secrets.SERVER_HOST }}
          USER=${{ secrets.SERVER_USER }}
          APP=/root/apps/robbit-quiz
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30"
          SSH="sshpass -e ssh $SSH_OPTS"
          SCP="sshpass -e scp $SSH_OPTS"

          $SSH $USER@$HOST "mkdir -p $APP"
          $SCP robbit-quiz.tgz $USER@$HOST:/tmp/robbit-quiz.tgz
          $SCP /tmp/app.env    $USER@$HOST:$APP/.env

          $SSH $USER@$HOST "
            set -e

            # PostgreSQL o'rnatish (agar yo'q bo'lsa)
            if ! command -v psql &>/dev/null; then
              apt-get update -qq && apt-get install -y postgresql
            fi
            systemctl enable postgresql --now 2>/dev/null || true

            # pg_hba.conf — trust auth (localhost, firewall orqasida xavfsiz).
            # Trust qo'yamiz va parolni e'tiborsiz qoldiramiz (P1000 oldini olish).
            PG_HBA=\$(sudo -u postgres psql -tAc 'SHOW hba_file')
            if ! grep -q 'robbit_quiz.*robbit.*trust' \"\$PG_HBA\" 2>/dev/null; then
              sed -i '1s/^/local robbit_quiz robbit trust\nhost robbit_quiz robbit 127.0.0.1\/32 trust\nhost robbit_quiz robbit ::1\/128 trust\n/' \"\$PG_HBA\"
            fi
            # Ishlab turgan instance'ga konfigni qayta o'qitamiz (systemctl reload ba'zan
            # meta-service'da no-op bo'ladi; pg_reload_conf() aniq ishlaydi).
            sudo -u postgres psql -c \"SELECT pg_reload_conf();\" || systemctl reload postgresql || true

            # DB va user yaratish / parolni yangilash
            sudo -u postgres psql -c \"CREATE USER robbit WITH PASSWORD '$DB_PASS';\" 2>/dev/null || true
            sudo -u postgres psql -c \"ALTER USER robbit WITH PASSWORD '$DB_PASS';\"
            sudo -u postgres psql -tc \"SELECT 1 FROM pg_database WHERE datname='robbit_quiz'\" | grep -q 1 || \
              sudo -u postgres createdb -O robbit robbit_quiz
            sudo -u postgres psql -c \"GRANT ALL PRIVILEGES ON DATABASE robbit_quiz TO robbit;\" || true
            sudo -u postgres psql -d robbit_quiz -c \"GRANT ALL ON SCHEMA public TO robbit;\" || true

            # Eski fayllarni tozalash
            rm -rf $APP/prisma/migrations $APP/dist $APP/public
            tar -xzf /tmp/robbit-quiz.tgz -C $APP
            rm -f /tmp/robbit-quiz.tgz

            cd $APP
            npm install --omit=dev
            npx prisma generate

            # PostgreSQL cluster'i 5432 da bo'lmasligi mumkin (bu serverda 5435 da turibdi;
            # 5432 ni boshqa narsa egallagan → P1000). Haqiqiy portni aniqlab, Prisma'ni
            # o'sha cluster'ning unix socket'iga yo'naltiramiz (local trust — parolsiz, port-agnostik).
            PG_PORT=\$(sudo -u postgres psql -tAc 'SHOW port' | tr -d '[:space:]')
            echo \"PostgreSQL porti: \$PG_PORT\"
            sed -i \"s#^DATABASE_URL=.*#DATABASE_URL=postgresql://robbit@localhost:\${PG_PORT}/robbit_quiz?host=/var/run/postgresql#\" $APP/.env
            # robbit_quiz bazasi o'sha cluster'da borligini kafolatlash
            sudo -u postgres psql -p \$PG_PORT -tc \"SELECT 1 FROM pg_database WHERE datname='robbit_quiz'\" | grep -q 1 || \
              sudo -u postgres createdb -p \$PG_PORT -O robbit robbit_quiz

            # --- AVTOMATIK BACKUP (migratsiyadan OLDIN) — ma'lumot yo'qolmasligi kafolati ---
            # Har deployда to'liq pg_dump olinadi. Oxirgi 30 ta backup saqlanadi.
            # Tiklash:  sudo -u postgres psql -p PORT robbit_quiz < /root/backups/FAYL.sql
            mkdir -p /root/backups
            BK_TS=\$(date +%Y%m%d_%H%M%S)
            if sudo -u postgres pg_dump -p \$PG_PORT robbit_quiz > /root/backups/robbit_quiz_\$BK_TS.sql 2>/dev/null; then
              echo \"✅ Backup: /root/backups/robbit_quiz_\$BK_TS.sql (\$(wc -c < /root/backups/robbit_quiz_\$BK_TS.sql) bayt)\"
            else
              echo \"⚠️ Backup olinmadi (baza bo'sh yoki yangi bo'lishi mumkin)\"
            fi
            ls -1t /root/backups/robbit_quiz_*.sql 2>/dev/null | tail -n +31 | xargs -r rm -f

            # Failed/yarim qolgan migratsiya yozuvlarini tozalash
            sudo -u postgres psql -p \$PG_PORT robbit_quiz -c 'DELETE FROM \"_prisma_migrations\" WHERE finished_at IS NULL OR rolled_back_at IS NOT NULL' 2>/dev/null || true
            # Jadvallar allaqachon bor, lekin migratsiya tarixi yo'q bo'lsa (P3005) — init'ni
            # baseline qilamiz. Bo'sh bazada esa resolve QILMAYMIZ — migrate deploy hammasini quradi.
            HAS_TABLE=\$(sudo -u postgres psql -p \$PG_PORT -d robbit_quiz -tAc \"SELECT 1 FROM information_schema.tables WHERE table_schema='public' AND table_name='Teacher'\" | tr -d '[:space:]')
            if [ \"\$HAS_TABLE\" = \"1\" ]; then
              npx prisma migrate resolve --applied 20260628104152_init 2>/dev/null || true
            fi
            npx prisma migrate deploy

            node prisma/seed-admin.mjs '$ADMIN_EMAIL' '$ADMIN_PASSWORD' || true
            # Yo'riqnoma: baza bo'sh bo'lsa tayyor kontentni tiklaydi, bor bo'lsa tegmaydi
            node prisma/seed-guide-if-empty.mjs || true
            pm2 restart robbit-quiz 2>/dev/null || pm2 start $APP/ecosystem.config.cjs
            pm2 save
            echo '✅ Deploy tugadi'
            pm2 logs robbit-quiz --lines 15 --nostream
          "
