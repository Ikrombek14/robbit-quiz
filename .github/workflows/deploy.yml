name: Deploy → robbit-quiz server

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        run: npm ci && npm run build

      - name: Backend build
        working-directory: backend
        run: npm ci && npm run build

      - name: Tarball tayyorlash
        run: |
          mkdir -p _deploy/public
          cp -r backend/dist            _deploy/dist
          cp -r frontend/dist/.         _deploy/public/
          cp -r backend/prisma          _deploy/prisma
          cp    backend/package.json    _deploy/
          cp    backend/package-lock.json _deploy/
          cp    backend/ecosystem.config.cjs _deploy/
          rm -f _deploy/prisma/dev.db
          tar -czf robbit-quiz.tgz -C _deploy .

      - name: sshpass o'rnatish
        run: sudo apt-get install -y sshpass

      - name: Serverga yuborish va o'rnatish
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          ADMIN_EMAIL: teamlead.robbit@gmail.com
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          HOST=${{ secrets.SERVER_HOST }}
          USER=${{ secrets.SERVER_USER }}
          APP=/root/apps/robbit-quiz
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30"

          if [ -n "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "${{ secrets.SERVER_SSH_KEY }}" > /tmp/deploy_key
            chmod 600 /tmp/deploy_key
            SCP="scp -i /tmp/deploy_key $SSH_OPTS"
            SSH="ssh -i /tmp/deploy_key $SSH_OPTS"
          else
            SCP="sshpass -e scp $SSH_OPTS"
            SSH="sshpass -e ssh $SSH_OPTS"
          fi

          # Serverdan DATABASE_URL ni o'qiymiz (server-setup.sh da yaratilgan)
          DB_URL=$($SSH $USER@$HOST "grep DATABASE_URL /root/db_credentials.txt 2>/dev/null | cut -d= -f2- | tr -d '\"'" || echo "")
          if [ -z "$DB_URL" ]; then
            echo "❌ XATO: /root/db_credentials.txt topilmadi! server-setup.yml ni avval ishga tushiring."
            exit 1
          fi
          echo "✅ DATABASE_URL serverdan olindi"

          # .env fayl tayyorlash
          printf 'NODE_ENV=production\nPORT=4000\nCLIENT_URL=https://robbitquiz.uz\nDATABASE_URL=%s\nJWT_SECRET=%s\nANTHROPIC_API_KEY=%s\nGOOGLE_CLIENT_ID=%s\nADMIN_EMAILS=teamlead.robbit@gmail.com\n' \
            "$DB_URL" "$JWT_SECRET" "$ANTHROPIC_API_KEY" "$GOOGLE_CLIENT_ID" \
            > /tmp/app.env

          # Papka yaratish va fayllarni yuborish
          $SSH $USER@$HOST "mkdir -p $APP"
          $SCP robbit-quiz.tgz $USER@$HOST:/tmp/robbit-quiz.tgz
          $SCP /tmp/app.env    $USER@$HOST:$APP/.env

          # O'rnatish (PostgreSQL parolini ham server-side peer auth bilan yangilaymiz)
          $SSH $USER@$HOST "
            set -e
            DB_RAW_URL=\$(grep DATABASE_URL /root/db_credentials.txt | cut -d= -f2- | tr -d '\"')
            DB_PW=\$(echo \"\$DB_RAW_URL\" | sed 's|postgresql://[^:]*:\([^@]*\)@.*|\1|')
            echo \"DB_PW uzunligi: \${#DB_PW}\"

            echo 'Updating PostgreSQL password via peer auth...'
            sudo -u postgres psql < /dev/null -c \"ALTER USER robbit WITH PASSWORD '\$DB_PW';\" && echo 'Password updated OK' || echo 'Password update failed!'

            echo 'Testing DB connection directly...'
            PGPASSWORD=\"\$DB_PW\" psql -U robbit -h 127.0.0.1 -d robbit_quiz -c \"SELECT 'connected' AS status;\" < /dev/null \
              && echo '✅ DB connection OK' \
              || { echo '❌ DB connection FAILED'; exit 1; }

            mkdir -p $APP
            tar -xzf /tmp/robbit-quiz.tgz -C $APP
            rm -f /tmp/robbit-quiz.tgz
            echo \"--- .env DATABASE_URL ---\"
            grep DATABASE_URL $APP/.env | sed 's|://.*:.*@|://USER:***@|g'
            cd $APP
            npm install --omit=dev
            npx prisma generate
            npx prisma migrate deploy
            node prisma/seed-admin.mjs '$ADMIN_EMAIL' '$ADMIN_PASSWORD' || true
            pm2 restart robbit-quiz 2>/dev/null || pm2 start $APP/ecosystem.config.cjs
            pm2 save
            echo '✅ Deploy tugadi'
            pm2 logs robbit-quiz --lines 15 --nostream
          "
