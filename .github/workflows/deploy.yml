name: Deploy → robbit-quiz server

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        run: npm ci && npm run build

      - name: Backend build
        working-directory: backend
        run: npm ci && npm run build

      - name: Tarball tayyorlash
        run: |
          mkdir -p _deploy/public
          cp -r backend/dist          _deploy/dist
          cp -r frontend/dist/.       _deploy/public/
          cp -r backend/prisma        _deploy/prisma
          cp    backend/package.json  _deploy/
          cp    backend/package-lock.json _deploy/
          cp    backend/ecosystem.config.cjs _deploy/
          rm -f _deploy/prisma/dev.db
          tar -czf robbit-quiz.tgz -C _deploy .

      - name: Serverga yuborish (SCP)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: robbit-quiz.tgz
          target: /tmp/

      - name: Serverda o'rnatish (SSH)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            APP=/root/apps/robbit-quiz
            mkdir -p $APP
            tar -xzf /tmp/robbit-quiz.tgz -C $APP
            rm -f /tmp/robbit-quiz.tgz
            cd $APP
            npm install --omit=dev
            npx prisma generate
            npx prisma migrate deploy
            pm2 restart robbit-quiz 2>/dev/null || pm2 start ecosystem.config.cjs
            pm2 save
            echo "✅ Deploy tugadi: $(date)"
