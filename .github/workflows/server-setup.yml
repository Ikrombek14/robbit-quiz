name: Server sozlash (bir martalik)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: sshpass o'rnatish
        run: sudo apt-get install -y sshpass

      - name: Server holati tekshirish
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "echo '=== Server ===' && uname -a && df -h / | tail -1 && free -h | grep Mem"

      - name: server-setup.sh yuborish va ishga tushirish
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
          DB_PASS: ${{ secrets.SERVER_DB_PASS }}
        run: |
          sshpass -e scp -o StrictHostKeyChecking=no \
            server-setup.sh \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/root/server-setup.sh

          # DB_PASS env orqali uzatamiz, HTTPS uchun "n" javob beramiz
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "chmod +x /root/server-setup.sh && export DB_PASS='$DB_PASS'; echo 'n' | bash /root/server-setup.sh 2>&1"

      - name: GitHub Actions SSH private key'ni ko'rsatish
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
        run: |
          echo "====== SERVER_SSH_KEY ni GitHub Secrets ga qo'shing ======"
          sshpass -e ssh -o StrictHostKeyChecking=no \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "cat /root/.ssh/github_actions"
          echo "====== yuqoridagi private key ni SERVER_SSH_KEY sifatida saqlang ======"
