name: Deploy → robbit-quiz server

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node.js o'rnatish
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        run: npm ci && npm run build

      - name: Backend build
        working-directory: backend
        run: npm ci && npm run build

      - name: Tarball tayyorlash
        run: |
          mkdir -p _deploy/public
          cp -r backend/dist              _deploy/dist
          cp -r frontend/dist/.           _deploy/public/
          cp -r backend/prisma            _deploy/prisma
          cp    backend/package.json      _deploy/
          cp    backend/package-lock.json _deploy/
          cp    backend/ecosystem.config.cjs _deploy/
          rm -f _deploy/prisma/dev.db
          tar -czf robbit-quiz.tgz -C _deploy .

      - name: .env fayl tayyorlash
        env:
          DB_PASS: ${{ secrets.DB_PASS }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
        run: |
          printf 'NODE_ENV=production\nPORT=4000\nCLIENT_URL=https://robbitquiz.uz\nDATABASE_URL=postgresql://robbit:%s@localhost:5432/robbit_quiz\nJWT_SECRET=%s\nANTHROPIC_API_KEY=%s\nGOOGLE_CLIENT_ID=%s\nADMIN_EMAILS=teamlead.robbit@gmail.com\n' \
            "$DB_PASS" "$JWT_SECRET" "$ANTHROPIC_API_KEY" "$GOOGLE_CLIENT_ID" > /tmp/app.env

      - name: sshpass o'rnatish
        run: sudo apt-get install -y sshpass

      - name: Serverga yuborish va o'rnatish
        env:
          SSHPASS: ${{ secrets.SERVER_PASS }}
          DB_PASS: ${{ secrets.DB_PASS }}
          ADMIN_EMAIL: teamlead.robbit@gmail.com
          ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
        run: |
          HOST=${{ secrets.SERVER_HOST }}
          USER=${{ secrets.SERVER_USER }}
          APP=/root/apps/robbit-quiz
          SSH_OPTS="-o StrictHostKeyChecking=no -o ConnectTimeout=30"
          SSH="sshpass -e ssh $SSH_OPTS"
          SCP="sshpass -e scp $SSH_OPTS"

          $SSH $USER@$HOST "mkdir -p $APP"
          $SCP robbit-quiz.tgz $USER@$HOST:/tmp/robbit-quiz.tgz
          $SCP /tmp/app.env    $USER@$HOST:$APP/.env

          $SSH $USER@$HOST "
            set -e

            # PostgreSQL o'rnatish (agar yo'q bo'lsa)
            if ! command -v psql &>/dev/null; then
              apt-get update -qq && apt-get install -y postgresql
            fi
            systemctl enable postgresql --now 2>/dev/null || true

            # pg_hba.conf — trust auth (localhost, firewall orqasida xavfsiz)
            PG_HBA=\$(sudo -u postgres psql -tAc 'SHOW hba_file')
            if ! grep -q 'robbit_quiz.*trust' \"\$PG_HBA\" 2>/dev/null; then
              sed -i '1s/^/host robbit_quiz robbit 127.0.0.1\/32 trust\nhost robbit_quiz robbit ::1\/128 trust\n/' \"\$PG_HBA\"
              systemctl reload postgresql
            fi

            # DB va user yaratish (agar yo'q bo'lsa)
            sudo -u postgres psql -c \"DO \\\$\\\$ BEGIN
              IF NOT EXISTS (SELECT FROM pg_roles WHERE rolname='robbit') THEN
                CREATE USER robbit WITH PASSWORD '$DB_PASS';
              END IF;
            END \\\$\\\$;\"
            sudo -u postgres psql -c \"GRANT ALL PRIVILEGES ON DATABASE robbit_quiz TO robbit\" 2>/dev/null || true
            sudo -u postgres psql -tc \"SELECT 1 FROM pg_database WHERE datname='robbit_quiz'\" | grep -q 1 || \
              sudo -u postgres createdb -O robbit robbit_quiz

            # Eski fayllarni tozalash
            rm -rf $APP/prisma/migrations $APP/dist $APP/public
            tar -xzf /tmp/robbit-quiz.tgz -C $APP
            rm -f /tmp/robbit-quiz.tgz

            cd $APP
            npm install --omit=dev
            npx prisma generate

            # Migratsiya: P3005 (jadvallar bor, tarix yo'q) holatini avtomatik hal qilish
            npx prisma migrate resolve --applied 20260628104152_init 2>/dev/null || true
            # Failed/yarim qolgan yozuvlarni tozalash
            sudo -u postgres psql robbit_quiz -c 'DELETE FROM \"_prisma_migrations\" WHERE finished_at IS NULL OR rolled_back_at IS NOT NULL' 2>/dev/null || true
            npx prisma migrate deploy

            node prisma/seed-admin.mjs '$ADMIN_EMAIL' '$ADMIN_PASSWORD' || true
            pm2 restart robbit-quiz 2>/dev/null || pm2 start $APP/ecosystem.config.cjs
            pm2 save
            echo '✅ Deploy tugadi'
            pm2 logs robbit-quiz --lines 15 --nostream
          "
