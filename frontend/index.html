<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ===== Asosiy SEO ===== -->
    <title>Robbit — Interaktiv ta'lim va jonli quiz platformasi</title>
    <meta
      name="description"
      content="Robbit Akademiyasi — o'quvchilar uchun jonli, interaktiv quiz va ta'lim platformasi. O'qituvchilar dars slaydlari va testlar yaratadi, o'quvchilar 6 xonali kod bilan real vaqtda darsga qo'shiladi. Robotexnika va dasturlash bo'yicha o'quv dasturlar."
    />
    <meta
      name="keywords"
      content="Robbit, Robbit Akademiyasi, interaktiv quiz, jonli test, ta'lim platformasi, robotexnika, dasturlash, o'quvchilar uchun quiz, kahoot uzbek, quizizz uzbek, dars kodi, robbitquiz"
    />
    <meta name="author" content="Robbit Akademiyasi" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#2f6fed" />
    <link rel="canonical" href="https://robbitquiz.uz/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ===== Open Graph (Facebook, Telegram, LinkedIn) ===== -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Robbit Akademiyasi" />
    <meta property="og:title" content="Robbit — Interaktiv ta'lim va jonli quiz platformasi" />

      property="og:description"
      content="O'qituvchilar dars va testlar yaratadi, o'quvchilar 6 xonali kod bilan real vaqtda darsga qo'shiladi. Robotexnika va dasturlash bo'yicha o'quv dasturlar."

      name="twitter:description"

    <!-- ===== Tuzilmali ma'lumot (Google Rich Results / JSON-LD) ===== -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "EducationalOrganization",
        "name": "Robbit Akademiyasi",
        "url": "https://robbitquiz.uz/",
        "description": "O'quvchilar uchun jonli, interaktiv quiz va ta'lim platformasi. Robotexnika va dasturlash bo'yicha o'quv dasturlar.",
        "potentialAction": {
          "@type": "SearchAction",
          "target": "https://robbitquiz.uz/join?pin={pin}",
          "query-input": "required name=pin"
        }
      }
    </script>
