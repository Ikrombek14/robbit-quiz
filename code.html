<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }
        .canvas-overlay {
            pointer-events: none;
        }
        .bounce-button {
            transition: all 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border-bottom: 4px solid rgba(0,0,0,0.2);
        }
        .bounce-button:active {
            transform: translateY(2px);
            border-bottom-width: 0px;
        }
        .slide-container {
            aspect-ratio: 16 / 9;
        }
        .reaction-float {
            animation: floatUp 2s ease-out forwards;
        }
        @keyframes floatUp {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-100px) scale(1.5); opacity: 0; }
        }
        .scribble-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: draw 2s ease-in-out forwards;
        }
        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }
    </style>

<body class="bg-background text-on-background font-body-md overflow-hidden h-screen flex flex-col">

<span class="font-label-md text-label-md">846 Ball</span>
</div>
</div>
<div class="flex items-center gap-4">
<div class="hidden sm:block text-on-surface-variant font-label-md bg-surface-container px-4 py-1 rounded-lg">
                Dars kodi: <span class="font-bold text-primary">882-991</span>
</div>
<div class="flex gap-2">
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors active:translate-y-0.5">
<span class="material-symbols-outlined">group</span>
</button>
<button class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-highest transition-colors active:translate-y-0.5">
<span class="material-symbols-outlined">settings</span>
</button>
</div>

</header>
<!-- Main Live Content -->
<main class="flex-grow flex items-center justify-center p-4 md:p-12 mt-12 mb-20">
<div class="relative w-full max-w-6xl slide-container bg-secondary-fixed-dim rounded-3xl shadow-2xl overflow-hidden border-4 border-white/50 group">
<!-- Background Pattern -->
<div class="absolute inset-0 opacity-10 pointer-events-none" style="background-image: radial-gradient(#006e21 1px, transparent 1px); background-size: 20px 20px;"></div>
<!-- Slide Content (Simulated) -->
<div class="relative w-full h-full p-8 md:p-16 flex flex-col items-start justify-center gap-8 z-10">
<h2 class="font-headline-lg text-headline-lg text-secondary drop-shadow-sm">Dars maqsadi:</h2>
<div class="bg-surface-container-lowest p-8 rounded-2xl shadow-lg border-2 border-outline-variant max-w-2xl transform -rotate-1">
<div class="flex gap-2 mb-4">
<div class="w-3 h-3 rounded-full bg-error"></div>
<div class="w-3 h-3 rounded-full bg-sunny-lemon"></div>
<div class="w-3 h-3 rounded-full bg-secondary"></div>
</div>
<ul class="space-y-4 font-label-lg text-label-lg text-on-surface-variant list-disc pl-6 leading-relaxed">
<li>Bilimlarimizni tekshirib olamiz;</li>
<li>Lug'at ma'lumot turi bilan tanishamiz;</li>
<li>Lug'atlar bilan ishlovchi metodlarni ko'rib chiqamiz;</li>
</ul>
</div>
<!-- Floating Code Card (Asymmetric Layout) -->
<div class="absolute top-12 right-12 w-64 md:w-80 bg-deep-plum rounded-xl overflow-hidden shadow-2xl transform rotate-2 hidden md:block">
<div class="bg-white/10 p-2 flex gap-1.5">
<div class="w-2.5 h-2.5 rounded-full bg-red-400"></div>
<div class="w-2.5 h-2.5 rounded-full bg-yellow-400"></div>
<div class="w-2.5 h-2.5 rounded-full bg-green-400"></div>
</div>
<div class="h-40 bg-cover bg-center" data-alt="A clean screenshot of modern Python code in a dark mode IDE, featuring colorful syntax highlighting for dictionaries and lists. The background is a soft, deep plum color, and the code looks professional and educational, fitting the modern aesthetic of the BilimYo'li platform." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuDWCdpYIphB9t37XfNSJbuwYB6dLukUTGBeV0LhgypXXWrwJt_sOtRQSByENOF0KPByi1TW8qNRumMH5ICN227VB2HsEAOsssTsKtDUm5ftZstiXHMFJcETVgN8coPcqA9jf-coxWZzgqgoiQitPzGCKWBjzQR6eunhzAGjlZiROlDm6ruM1E43-SR1A649QwBMyaMnGjd7hqHHRKdfFiHKdQDqmeU8IRqMCF7zEPhPyDg5wc6rC5u0IY9gyKAsjkwG8f5xK-Ix4iW1')"></div>
</div>

</button>

</button>

</button>
</div>

<button class="bg-surface-container-highest px-4 py-2 rounded-xl flex items-center gap-2 hover:bg-outline-variant transition-colors active:scale-95">

<span class="hidden md:inline font-label-md text-on-surface-variant">Savol berish</span>
</button>

<!-- Floating Reaction Container -->
<div class="fixed inset-0 pointer-events-none z-[100]" id="reaction-container"></div>
<script>
        function sendReaction(emoji) {
            const container = document.getElementById('reaction-container');
            const reaction = document.createElement('div');
            
            // Random horizontal position near the bottom buttons
            const xPos = (window.innerWidth / 2) + (Math.random() * 100 - 50);
            
            reaction.className = 'reaction-float absolute bottom-24 text-4xl';
            reaction.style.left = `${xPos}px`;
            reaction.innerText = emoji;
            
            container.appendChild(reaction);
            
            // Remove after animation
            setTimeout(() => {
                reaction.remove();
            }, 2000);
        }

        // Simulate random incoming reactions from other students
        setInterval(() => {
            const emojis = ['👍', '❤️', '💡', '✨'];
            if (Math.random() > 0.7) {
                sendReaction(emojis[Math.floor(Math.random() * emojis.length)]);
            }
        }, 3000);
    </script>
</body></html>
